name: Publish to npm

# Publish @pulsmarket/sdk whenever a version tag (v*) is pushed, e.g.:
#   npm version patch && git push --follow-tags
# Requires repo secret NPM_TOKEN (an npm "Automation" access token).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance (verified "published from this repo" badge)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      # publishConfig.access=public is in package.json; --provenance adds the
      # verified provenance badge on npmjs.com.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
